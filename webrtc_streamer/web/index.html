<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Orbbec Femto Mega WebVR SBS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        textarea { width: 300px; height: 100px; display: block; margin: 5px 0; font-family: monospace; font-size: 10px; }
        button { cursor: pointer; padding: 5px 10px; background: #444; color: white; border: 1px solid #666; }
        button:hover { background: #666; }
        #status { margin-top: 5px; font-weight: bold; color: #0f0; }
        label { display: block; margin-top: 5px; font-size: 12px; color: #ccc; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="ui">
        <h3>Signaling (Automated)</h3>
        <div id="signalingStatus">Signaling Server: Connecting...</div>
        <div id="status">Status: Waiting for Offer...</div>
        <div id="log" style="margin-top:10px; font-size: 10px; color: #aaa; height: 60px; overflow-y: auto; border: 1px solid #333; padding: 2px;"></div>

        <div id="controls" style="margin-top:20px; border-top: 1px solid #555; padding-top:10px;">
            <h3>Remote Control</h3>
            <div>
                <label>Laser: </label>
                <button onclick="sendControl('laser', true)">ON</button>
                <button onclick="sendControl('laser', false)">OFF</button>
            </div>
            <div style="margin-top:10px;">
                <label>Auto Exposure: </label>
                <input type="checkbox" id="ae_toggle" checked onchange="sendControl('auto_exposure', this.checked)">
            </div>
            <div style="margin-top:10px;">
                <label>Exposure: </label>
                <input type="range" min="1" max="10000" value="100" id="exposure_slider" oninput="sendControl('exposure', parseInt(this.value)); document.getElementById('exp_val').innerText = this.value">
                <span id="exp_val">100</span>
            </div>
            <div style="margin-top:10px;">
                <label>Gain: </label>
                <input type="range" min="1" max="255" value="1" id="gain_slider" oninput="sendControl('gain', parseInt(this.value)); document.getElementById('gain_val').innerText = this.value">
                <span id="gain_val">1</span>
            </div>
            <div style="margin-top:20px; border-top: 1px solid #444; padding-top:10px;">
                <label>View Mode: </label>
                <select onchange="sendControl('viz_mode', parseInt(this.value)); updateShaderMode(this.value)">
                    <option value="0">Side-By-Side (3D)</option>
                    <option value="1">Color Only</option>
                    <option value="2">Depth Only</option>
                </select>
            </div>
            <div style="margin-top:10px;">
                <label>Depth Colormap: </label>
                <input type="checkbox" checked onchange="sendControl('colormap', this.checked)">
            </div>
            <div style="margin-top:10px;">
                <label>Show Overlay: </label>
                <input type="checkbox" checked onchange="changeOverlay(this.checked)">
            </div>
            <div style="margin-top:10px; border-top: 1px solid #444; padding-top:10px;">
                <button onclick="toggleDebug()">Toggle Debug Video</button>
            </div>
        </div>
    </div>

    <video id="remoteVideo" autoplay playsinline style="display:none; position: absolute; bottom: 10px; right: 10px; width: 320px; border: 2px solid white; z-index: 200; background: #222;"></video>

    <script>
        let scene, camera, renderer, video, videoTexture, mesh, orbitControls;
        let dataChannel;
        let shaderMaterial;

        function toggleDebug() {
            const v = document.getElementById('remoteVideo');
            v.style.display = (v.style.display === 'none' ? 'block' : 'none');
        }
        let pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        video = document.getElementById('remoteVideo');

        function updateShaderMode(mode) {
            if (shaderMaterial) {
                shaderMaterial.uniforms.uMode.value = parseInt(mode);
            }
        }

        function changeOverlay(enabled) {
            sendControl('overlay', enabled);
        }

        function sendControl(type, value) {
            if (dataChannel && dataChannel.readyState === 'open') {
                const msg = JSON.stringify({ type, value });
                dataChannel.send(msg);
                console.log("Sent control:", msg);
            } else {
                console.warn("Data channel not open");
            }
        }

        function log(msg) {
            const div = document.getElementById('log');
            div.innerText += msg + "\n";
            div.scrollTop = div.scrollHeight;
            console.log(msg);
        }

        // --- Automated Signaling ---
        const ws = new WebSocket('ws://' + (window.location.hostname || '127.0.0.1') + ':8889');
        const sigStatus = document.getElementById('signalingStatus');
        const status = document.getElementById('status');

        let offerReceived = false;

        ws.onopen = () => {
            sigStatus.innerText = "Signaling Server: Connected";
            sigStatus.style.color = "#0f0";
            log("Connected to signaling server");
            
            // Periodically request offer until we get one
            const requestInterval = setInterval(() => {
                if (offerReceived) {
                    clearInterval(requestInterval);
                } else {
                    ws.send("request");
                    log("Sent 'request' to streamer...");
                }
            }, 2000);
        };

        ws.onclose = () => {
            sigStatus.innerText = "Signaling Server: Disconnected";
            sigStatus.style.color = "#f00";
            log("Disconnected from signaling server");
        };

        ws.onmessage = async (event) => {
            const msg = event.data;
            log("WS Received: " + msg.substr(0, 30) + "...");
            
            if (msg.includes('v=0') && (msg.includes('m=video') || msg.includes('a=fingerprint'))) {
                offerReceived = true;
                log("Recognized as SDP Offer!");
                status.innerText = "Status: Offer Received. Connecting...";
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: msg }));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    log("SDP Answer generated and sent");
                    ws.send(pc.localDescription.sdp);
                } catch (e) {
                    log("SDP Error: " + e.message);
                    status.innerText = "Status: Error " + e.message;
                }
            } else {
                log("Message ignored (not a valid SDP Offer)");
            }
        };

        pc.onicegatheringstatechange = () => {
            log("ICE State: " + pc.iceGatheringState);
            if (pc.iceGatheringState === 'complete') {
                log("Sending Answer to streamer");
                ws.send(pc.localDescription.sdp);
            }
        };

        pc.onconnectionstatechange = () => {
            log("WebRTC State: " + pc.connectionState);
            if (pc.connectionState === 'connected') {
                status.innerText = "Status: Streaming Active!";
            }
        };

        pc.ontrack = event => {
            console.log("Received remote track:", event.track.kind);
            if (event.streams && event.streams[0]) {
                video.srcObject = event.streams[0];
            } else {
                console.log("No stream found, creating one for the track");
                const stream = new MediaStream();
                stream.addTrack(event.track);
                video.srcObject = stream;
            }
            video.onloadedmetadata = () => {
                console.log("Video metadata loaded, size:", video.videoWidth, "x", video.videoHeight);
                video.play().catch(e => console.error("Error playing video:", e));
                setup3DView();
                document.getElementById('status').innerText = "Status: Streaming Active!";
            };
        };

        pc.ondatachannel = event => {
            dataChannel = event.channel;
            dataChannel.onopen = () => console.log("Data channel open");
            dataChannel.onmessage = e => console.log("Received data:", e.data);
        };

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function setup3DView() {
            if (mesh) return;
            
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
            videoTexture.format = THREE.RGBFormat;

            // Geometry with high resolution for displacement mapping
            const geometry = new THREE.PlaneGeometry(2, 1.5, 256, 256);
            
            shaderMaterial = new THREE.ShaderMaterial({
                uniforms: { 
                    tVideo: { value: videoTexture },
                    uMode: { value: 0 } // 0: SBS, 1: Color Only, 2: Depth Only
                },
                vertexShader: `
                    uniform sampler2D tVideo;
                    uniform int uMode;
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        vec3 pos = position;
                        if (uMode == 0) {
                            // In SBS, Depth is on the right half (x: 0.5 to 1.0)
                            vec2 depthUv = vec2(uv.x * 0.5 + 0.5, uv.y);
                            vec4 depthSample = texture2D(tVideo, depthUv);
                            // Using R channel for depth (assuming grayscale or colormapped)
                            // We normalize it roughly. Real depth would need better scaling.
                            float depth = depthSample.r; 
                            pos.z = (1.0 - depth) * 0.5; 
                        }
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tVideo;
                    uniform int uMode;
                    varying vec2 vUv;
                    void main() {
                        if (uMode == 0) {
                            // Color is on the left half (x: 0.0 to 0.5)
                            vec2 colorUv = vec2(vUv.x * 0.5, vUv.y);
                            gl_FragColor = texture2D(tVideo, colorUv);
                        } else if (uMode == 1) {
                            // Full frame is color
                            gl_FragColor = texture2D(tVideo, vUv);
                        } else {
                            // Full frame is depth
                            gl_FragColor = texture2D(tVideo, vUv);
                        }
                    }
                `,
                side: THREE.DoubleSide
            });
            
            mesh = new THREE.Mesh(geometry, shaderMaterial);
            scene.add(mesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (orbitControls) orbitControls.update();
            renderer.render(scene, camera);
        }

        initThree();
        animate();
    </script>
</body>
</html>
