services:
  webrtc-streamer:
    build:
      context: .
      dockerfile: Dockerfile
    image: orbbec-webrtc-dev:v1.0.0
    container_name: orbbec_streamer_container
    # Privileged mode and USB mounting are required for hardware camera access
    privileged: true
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - /tmp/.X11-unix:/tmp/.X11-unix
    # Host networking is highly recommended for WebRTC to avoid ICE/STUN issues in containers
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    stdin_open: true # Equivalent to -i
    tty: true        # Equivalent to -t
    working_dir: /workspace
    # Default command starts a bash shell, but you can override this to start the streamer directly
    command: /bin/bash
